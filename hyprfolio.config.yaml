# ─── Projects ────────────────────────────────────────────────────────────────
# Fetches pinned repos from GitHub automatically.
# Requires the GITHUB_TOKEN environment variable (PAT with public_repo + read:user).
# Manual items below are used as a fallback if GitHub is unavailable.

projects:
  github:
    username: christian-deleon
    sortBy: stars          # stars | updated | created | name
    maxRepos: 10           # total repos shown (pinned + rest)
    topics:                # optional — only show non-pinned repos matching these GitHub topics
      - devops
  items:
    - name: 'devops-stack'
      description: 'Complete DevOps Stack running on a Kubernetes cluster managed via GitOps.'
      url: 'https://github.com/christian-deleon/devops-stack'
      technologies:
        - Kubernetes
        - Helm
        - Terraform
        - ArgoCD
      featured: true

    - name: 'netbird-coredns'
      description: 'Highly available, NetBird peer-integrated DNS server with HTTP API for custom record management and Terraform support.'
      url: 'https://github.com/christian-deleon/netbird-coredns'
      technologies:
        - Go
        - CoreDNS
        - NetBird
        - Kubernetes
      featured: true

    - name: 'ansible-collection-kubernetes'
      description: 'Ansible collection for automated Kubernetes cluster deployment and management using RKE2 or kubeadm.'
      url: 'https://github.com/christian-deleon/ansible-collection-kubernetes'
      technologies:
        - Ansible
        - Kubernetes
        - RKE2
      featured: true

    - name: 'aws-ecr-secret-updater'
      description: 'Helm chart that automates AWS ECR image pull secret rotation across multiple Kubernetes namespaces.'
      url: 'https://github.com/christian-deleon/aws-ecr-secret-updater'
      technologies:
        - Kubernetes
        - Helm
        - AWS ECR
        - GitHub Actions
      featured: true

    - name: 'hyprfolio'
      description: 'Hyprland-inspired personal website template with responsive tiling layouts and switchable color palettes.'
      url: 'https://github.com/christian-deleon/hyprfolio'
      technologies:
        - Astro
        - TypeScript
        - Tailwind CSS
      featured: true

    - name: 'PySequence'
      description: 'Unofficial Python SDK and REST API server for the Sequence personal finance platform with GraphQL SDK, FastAPI server, and AI-powered Telegram bot.'
      url: 'https://github.com/christian-deleon/PySequence'
      technologies:
        - Python
        - FastAPI
        - GraphQL
      featured: true

