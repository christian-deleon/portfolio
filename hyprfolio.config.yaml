# ─── Visual Settings ─────────────────────────────────────────────────────────

palette:
  default: dracula
  defaultLight: catppuccin-latte
  respectSystem: false
  available:
    - catppuccin-mocha
    - catppuccin-latte
    - tokyo-night
    - tokyo-night-light
    - gruvbox-dark
    - gruvbox-light
    - nord
    - nord-light
    - dracula
    - rose-pine
    - rose-pine-dawn

wallpaper:
  image: '/wallpapers/wallpaper.jpg'
  opacity: 0.15
  blur: 10
  size: cover
  position: center

waybar:
  show: true
  # title auto-derives from profile.name as 'username@hyprfolio ~'
  workspaces: 5
  activeWorkspace: 1
  showClock: true
  showPaletteSwitcher: true
  height: 36 # px
  fontSize: 13 # px

layout:
  maxWidth: 1400
  innerGap: 10 # px, gap between tiles
  outerGap: 20 # px, padding around tile grid
  windowOpacity: 0.6 # 0 = fully transparent, 1 = fully opaque
  windowBlur: 10 # px, backdrop blur on windows
  borderRadius: 10 # px, window corner rounding
  borderWidth: 1 # px, window border thickness
  inactiveOpacity: 0.85 # dimming for inactive windows
  noiseOpacity: 0.03 # grain overlay intensity (0 to disable)
  terminalFontSize: 13 # px, monospace/terminal font size
  uiFontSize: 14 # px, UI/sans-serif font size

animations:
  enabled: true
  entrance: popin
  duration: 410
  stagger: 80
  hoverScale: 1.01

# ─── Tile Layout ─────────────────────────────────────────────────────────────

tiles:
  - content: about
    windowType: terminal
    colSpan: 7
    rowSpan: 2
    terminalTitle: 'neofetch — kitty'

  - content: skills
    windowType: system-monitor
    colSpan: 5
    rowSpan: 2
    title: 'Skills Monitor'

  - content: projects
    windowType: file-manager
    colSpan: 5
    rowSpan: 1
    title: 'Projects'

  - content: experience
    windowType: terminal
    colSpan: 7
    rowSpan: 3
    terminalTitle: 'git log — kitty'

  - content: certifications
    windowType: terminal
    colSpan: 5
    rowSpan: 1
    terminalTitle: 'certifications — kitty'

  - content: education
    windowType: terminal
    colSpan: 5
    rowSpan: 1
    terminalTitle: 'man education — kitty'

